<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unimoa - Password Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --spotify-black: #121212;
            --spotify-green: #1DB954;
        }
        body {
            background-color: var(--spotify-black);
            color: white;
            font-family: 'Circular', 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .input-spotify {
            background-color: #242424;
            border: 1px solid transparent;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .input-spotify:hover { background-color: #2a2a2a; }
        .input-spotify:focus { border-color: white; outline: none; background-color: #242424; }

        .btn-spotify {
            background-color: var(--spotify-green);
            color: black;
            font-weight: 800;
            border-radius: 500px;
            transition: all 0.2s;
        }
        .btn-spotify:hover { transform: scale(1.04); background-color: #1ed760; }
        
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            // view: 'login', 'signup', 'forgot_password', 'reset_sent', 'verify', 'app'
            const [view, setView] = useState('login');

            // 1. ログイン画面
            if (view === 'login') {
                return (
                    <div className="h-full overflow-y-auto no-scrollbar bg-gradient-to-b from-[#1a1a1a] to-[#121212]">
                        <div className="min-h-full flex flex-col items-center px-8 pt-10 pb-12 fade-up">
                            <div className="mb-8"><i className="fa-solid fa-compact-disc text-6xl text-[#1DB954]"></i></div>
                            <h1 className="text-3xl font-black text-center mb-10 tracking-tighter">音をデザインする。<br/>今すぐログイン。</h1>
                            <div className="w-full max-w-[400px] space-y-4">
                                <input type="email" className="input-spotify w-full h-14 px-5 rounded-md" placeholder="メールアドレス" />
                                <input type="password" className="input-spotify w-full h-14 px-5 rounded-md" placeholder="パスワード" />
                                <div className="flex justify-end pt-1">
                                    <span onClick={() => setView('forgot_password')} className="text-sm font-bold text-white underline cursor-pointer hover:text-[#1ed760]">パスワードをお忘れですか？</span>
                                </div>
                                <button onClick={() => setView('app')} className="btn-spotify w-full h-14 uppercase tracking-widest text-sm mt-4">ログイン</button>
                                <p className="pt-8 text-center text-sm font-black text-gray-400">アカウントをお持ちでないですか？ <br/>
                                <span onClick={() => setView('signup')} className="text-white underline cursor-pointer hover:text-[#1ed760]">今すぐ無料で登録</span></p>
                            </div>
                        </div>
                    </div>
                );
            }

            // 2. パスワードリセット要求画面 (メールアドレス入力)
            if (view === 'forgot_password') {
                return (
                    <div className="h-full overflow-y-auto no-scrollbar bg-[#121212]">
                        <div className="min-h-full flex flex-col items-center px-8 pt-20 pb-12 fade-up">
                            <div className="mb-8"><i className="fa-solid fa-compact-disc text-6xl text-[#1DB954]"></i></div>
                            <h1 className="text-3xl font-black text-center mb-4 tracking-tighter">パスワードをリセット</h1>
                            <p className="text-gray-400 font-bold text-center mb-10 max-w-[320px]">
                                ご登録済みのメールアドレスを入力してください。パスワード再設定用のリンクをお送りします。
                            </p>
                            
                            <form onSubmit={(e) => {e.preventDefault(); setView('reset_sent')}} className="w-full max-w-[400px] space-y-6">
                                <div>
                                    <label className="text-xs font-black mb-2 block ml-1 uppercase tracking-wider">メールアドレス</label>
                                    <input type="email" required className="input-spotify w-full h-14 px-5 rounded-md" placeholder="email@example.com" />
                                </div>
                                <button type="submit" className="btn-spotify w-full h-14 uppercase tracking-widest text-sm">送信する</button>
                                <div className="text-center pt-4">
                                    <span onClick={() => setView('login')} className="text-sm font-black text-gray-500 uppercase tracking-widest cursor-pointer hover:text-white transition-colors">
                                        <i className="fa-solid fa-arrow-left mr-2"></i> ログイン画面に戻る
                                    </span>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // 3. パスワードリセットメール送信完了
            if (view === 'reset_sent') {
                return (
                    <div className="h-full flex flex-col bg-[#121212]">
                        <div className="flex-1 flex flex-col items-center justify-center px-8 fade-up text-center">
                            <div className="w-24 h-24 bg-[#1DB954]/10 rounded-full flex items-center justify-center mb-8 border border-[#1DB954]/20">
                                <i className="fa-solid fa-key text-4xl text-[#1DB954]"></i>
                            </div>

                            <h1 className="text-3xl font-black mb-4 tracking-tighter">メールを送信しました</h1>
                            <p className="text-gray-400 font-bold leading-relaxed mb-10 max-w-[340px]">
                                パスワード再設定の手順を記載したメールを送信しました。メールフォルダを確認してください。
                            </p>

                            <div className="w-full max-w-[320px] space-y-4">
                                <button onClick={() => setView('login')} className="btn-spotify w-full h-14 text-sm uppercase tracking-widest">
                                    完了
                                </button>
                                <button onClick={() => setView('forgot_password')} className="w-full py-2 text-sm font-black text-gray-500 hover:text-white transition-colors">
                                    メールが届かない場合は再試行
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // 新規登録画面 (簡略化)
            if (view === 'signup') {
                return (
                    <div className="h-full bg-[#121212] flex flex-col items-center pt-20">
                        <h1 className="text-3xl font-black mb-10">新規登録画面</h1>
                        <span onClick={() => setView('login')} className="text-white underline cursor-pointer">戻る</span>
                    </div>
                );
            }

            // メインアプリ画面
            return (
                <div className="flex flex-col h-screen bg-[#121212]">
                    <header className="px-6 py-6 flex items-center justify-between border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-compact-disc text-2xl text-[#1DB954]"></i>
                            <span className="font-black tracking-tighter text-xl">UNIMOA</span>
                        </div>
                        <div onClick={() => setView('login')} className="w-10 h-10 rounded-full bg-[#282828] flex items-center justify-center cursor-pointer"><i className="fa-solid fa-user text-xs"></i></div>
                    </header>
                    <main className="flex-1 flex items-center justify-center italic font-black text-gray-700">APP CONTENT</main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
