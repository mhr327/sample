<!DOCTYPE html>
<html lang="ja" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unimoa - Artist Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.css" rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --spotify-black: #121212;
            --spotify-dark-grey: #181818;
            --spotify-light-grey: #282828;
            --spotify-green: #1DB954;
        }

        body {
            background-color: var(--spotify-black);
            color: white;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }

        .btn-spotify {
            background-color: var(--spotify-green);
            color: black;
            font-weight: 800;
            border-radius: 500px;
            transition: all 0.2s;
        }

        .btn-spotify:hover {
            background-color: #1ed760;
            transform: scale(1.02);
        }

        .card-artist {
            background: #181818;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-artist:hover {
            background: #282828;
            transform: translateY(-4px);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // モックデータ: きっかけの選択肢
        const TRIGGER_OPTIONS = ["SNSで話題", "フェスで見た", "友人のおすすめ", "Spotifyレコメンド", "タイアップ曲"];
        // モックデータ: タグの選択肢
        const TAG_OPTIONS = ["チル", "ハイテンション", "作業用", "夜に聴きたい", "エモい", "邦ロック", "歌い手"];

        const App = () => {
            const [view, setView] = useState('list'); // 'list' | 'add' | 'detail'
            const [artists, setArtists] = useState([
                {
                    spotifyId: "1", name: "Vaundy", nameEn: "Vaundy",
                    img: "https://i.scdn.co/image/ab6761610000e5eb986348ef520d73f4d6c141da",
                    genre: "J-Pop, Rock", trigger: "SNSで話題", tags: ["チル", "作業用"]
                },
                {
                    spotifyId: "2", name: "藤井 風", nameEn: "Fujii Kaze",
                    img: "https://i.scdn.co/image/ab6761610000e5eb56070629983949f50682245b",
                    genre: "J-Pop, Soul", trigger: "Spotifyレコメンド", tags: ["エモい", "夜に聴きたい"]
                }
            ]);

            const [selectedArtist, setSelectedArtist] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [searchSuggestions, setSearchSuggestions] = useState([]);

            // 新規登録用フォームステート
            const [formData, setFormData] = useState({
                spotifyId: '', name: '', nameEn: '', img: '', genre: '', trigger: '', tags: []
            });

            // Spotify検索のシミュレーション
            useEffect(() => {
                if (searchQuery.length > 1) {
                    // 本来はここでSpotify APIを叩く
                    const mockResults = [
                        { id: 's1', name: searchQuery, nameEn: 'Artist English', img: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200&h=200&fit=crop', genre: 'Pop' },
                        { id: 's2', name: searchQuery + " (Official)", nameEn: 'Artist Official', img: 'https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=200&h=200&fit=crop', genre: 'Rock' }
                    ];
                    setSearchSuggestions(mockResults);
                } else {
                    setSearchSuggestions([]);
                }
            }, [searchQuery]);

            const handleSelectFromSpotify = (item) => {
                setFormData({
                    ...formData,
                    spotifyId: item.id,
                    name: item.name,
                    nameEn: item.nameEn,
                    img: item.img,
                    genre: item.genre
                });
                setSearchQuery("");
                setSearchSuggestions([]);
            };

            const handleSave = () => {
                setArtists([...artists, formData]);
                setView('list');
                setFormData({ spotifyId: '', name: '', nameEn: '', img: '', genre: '', trigger: '', tags: [] });
            };

            const toggleTag = (tag) => {
                const newTags = formData.tags.includes(tag)
                    ? formData.tags.filter(t => t !== tag)
                    : [...formData.tags, tag];
                setFormData({ ...formData, tags: newTags });
            };

            return (
                <div className="flex flex-col h-full bg-[#121212]">
                    {/* Header */}
                    <header className="px-6 py-4 flex items-center justify-between border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('list')}>
                            <i className="fa-brands fa-spotify text-2xl text-[#1DB954]"></i>
                            <span className="font-black tracking-tighter text-lg">UNIMOA ARTISTS</span>
                        </div>
                        {view === 'list' && (
                            <button onClick={() => setView('add')} className="btn btn-sm btn-spotify border-none px-6">
                                <i className="fa-solid fa-plus mr-2"></i> 追加
                            </button>
                        )}
                    </header>

                    <main className="flex-1 overflow-y-auto no-scrollbar">
                        <div className="max-w-4xl mx-auto px-6 py-8">

                            {/* LIST VIEW */}
                            {view === 'list' && (
                                <div className="fade-in">
                                    <h2 className="text-3xl font-black mb-8">Registered Artists</h2>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                                        {artists.map((a, idx) => (
                                            <div key={idx} onClick={() => { setSelectedArtist(a); setView('detail'); }}
                                                className="card-artist rounded-2xl p-4 cursor-pointer group">
                                                <div className="aspect-square mb-4 overflow-hidden rounded-xl shadow-xl">
                                                    <img src={a.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                                </div>
                                                <h3 className="font-bold text-lg truncate">{a.name}</h3>
                                                <p className="text-xs text-gray-500 mb-2">{a.nameEn}</p>
                                                <div className="flex flex-wrap gap-1">
                                                    {a.tags.slice(0, 2).map(t => (
                                                        <span key={t} className="text-[10px] bg-white/10 px-2 py-0.5 rounded text-gray-400">#{t}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ADD VIEW */}
                            {view === 'add' && (
                                <div className="fade-in max-w-xl mx-auto">
                                    <button onClick={() => setView('list')} className="mb-6 text-sm font-bold text-gray-500 hover:text-white">
                                        <i className="fa-solid fa-arrow-left mr-2"></i> 戻る
                                    </button>
                                    <h2 className="text-3xl font-black mb-8">Artist Registration</h2>

                                    <div className="space-y-8">
                                        {/* Spotify Search Section */}
                                        <div className="relative">
                                            <label className="text-xs font-black text-gray-500 uppercase tracking-widest block mb-2">1. Spotifyから検索</label>
                                            <div className="relative">
                                                <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                                <input
                                                    type="text"
                                                    className="w-full h-12 bg-[#282828] rounded-xl pl-12 pr-4 font-bold focus:ring-2 ring-[#1DB954] outline-none"
                                                    placeholder="アーティスト名を入力..."
                                                    value={searchQuery}
                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                />
                                            </div>
                                            {searchSuggestions.length > 0 && (
                                                <div className="absolute top-full left-0 w-full bg-[#282828] mt-2 rounded-xl shadow-2xl z-50 overflow-hidden border border-white/10">
                                                    {searchSuggestions.map(s => (
                                                        <div key={s.id} onClick={() => handleSelectFromSpotify(s)} className="flex items-center gap-4 p-3 hover:bg-white/10 cursor-pointer">
                                                            <img src={s.img} className="w-10 h-10 rounded-full object-cover" />
                                                            <div>
                                                                <div className="font-bold text-sm">{s.name}</div>
                                                                <div className="text-xs text-gray-500">{s.genre}</div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {/* Form Details */}
                                        {formData.name && (
                                            <div className="bg-[#181818] p-6 rounded-2xl border border-[#1DB954]/30 space-y-6 fade-in">
                                                <div className="flex items-center gap-4 border-b border-white/5 pb-4">
                                                    <img src={formData.img} className="w-16 h-16 rounded-lg object-cover" />
                                                    <div>
                                                        <div className="text-xs text-[#1DB954] font-bold">Selected</div>
                                                        <div className="font-black text-xl">{formData.name}</div>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[10px] font-black text-gray-500 uppercase">英語名</label>
                                                        <input type="text" value={formData.nameEn} onChange={e => setFormData({ ...formData, nameEn: e.target.value })} className="w-full bg-[#282828] rounded-lg p-2 text-sm mt-1 outline-none focus:ring-1 ring-white/20" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-gray-500 uppercase">ジャンル</label>
                                                        <input type="text" value={formData.genre} onChange={e => setFormData({ ...formData, genre: e.target.value })} className="w-full bg-[#282828] rounded-lg p-2 text-sm mt-1 outline-none focus:ring-1 ring-white/20" />
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="text-[10px] font-black text-gray-500 uppercase block mb-2">管理のきっかけ (単一選択)</label>
                                                    <div className="flex flex-wrap gap-2">
                                                        {TRIGGER_OPTIONS.map(opt => (
                                                            <button key={opt} onClick={() => setFormData({ ...formData, trigger: opt })}
                                                                className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${formData.trigger === opt ? 'bg-[#1DB954] text-black' : 'bg-[#282828] text-gray-400 hover:bg-[#333]'}`}>
                                                                {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="text-[10px] font-black text-gray-500 uppercase block mb-2">タグ (複数選択可能)</label>
                                                    <div className="flex flex-wrap gap-2">
                                                        {TAG_OPTIONS.map(tag => (
                                                            <button key={tag} onClick={() => toggleTag(tag)}
                                                                className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${formData.tags.includes(tag) ? 'bg-white text-black' : 'bg-[#282828] text-gray-400 hover:bg-[#333]'}`}>
                                                                {formData.tags.includes(tag) && <i className="fa-solid fa-check mr-1"></i>}
                                                                {tag}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <button onClick={handleSave} className="btn-spotify w-full py-4 text-sm mt-4">
                                                    このアーティストを保存
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* DETAIL VIEW */}
                            {view === 'detail' && selectedArtist && (
                                <div className="fade-in">
                                    <button onClick={() => setView('list')} className="mb-6 text-sm font-bold text-gray-500 hover:text-white">
                                        <i className="fa-solid fa-arrow-left mr-2"></i> 一覧に戻る
                                    </button>

                                    <div className="flex flex-col md:flex-row gap-8 items-start">
                                        <div className="w-full md:w-1/3 aspect-square rounded-3xl overflow-hidden shadow-2xl">
                                            <img src={selectedArtist.img} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex-1 space-y-6">
                                            <div>
                                                <div className="text-[#1DB954] font-black text-sm tracking-widest uppercase mb-1">Artist Profile</div>
                                                <h1 className="text-5xl font-black mb-2">{selectedArtist.name}</h1>
                                                <p className="text-xl text-gray-400 font-medium">{selectedArtist.nameEn}</p>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="bg-[#181818] p-4 rounded-2xl border border-white/5">
                                                    <div className="text-[10px] font-black text-gray-500 uppercase mb-1">Genre</div>
                                                    <div className="font-bold">{selectedArtist.genre}</div>
                                                </div>
                                                <div className="bg-[#181818] p-4 rounded-2xl border border-white/5">
                                                    <div className="text-[10px] font-black text-gray-500 uppercase mb-1">Trigger</div>
                                                    <div className="font-bold">{selectedArtist.trigger || "未設定"}</div>
                                                </div>
                                            </div>

                                            <div>
                                                <div className="text-[10px] font-black text-gray-500 uppercase mb-3">Tags</div>
                                                <div className="flex flex-wrap gap-2">
                                                    {selectedArtist.tags.map(tag => (
                                                        <span key={tag} className="bg-[#1DB954]/10 text-[#1DB954] px-4 py-1.5 rounded-full text-sm font-bold border border-[#1DB954]/20">
                                                            #{tag}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="pt-6 border-t border-white/5">
                                                <div className="text-[10px] font-black text-gray-500 uppercase mb-2">Spotify ID</div>
                                                <div className="font-mono text-xs text-gray-500">{selectedArtist.spotifyId}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
